on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tz: [UTC, America/Los_Angeles, Pacific/Auckland]
    env:
      TZ: ${{ matrix.tz }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Run unit tests
        run: bun run test
